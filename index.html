<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="media/harvey-icon.jpg" type="image/x-icon">
  <script src='https://unpkg.com/harvey-specter-quotes@1.4.1/dist/index.umd.js'></script>
  <title>Harvey Says</title>
</head>
<body>
  <div id="main">
    <div id="title-container"><h1 id="title">Harvey Specter Quotes</h1></div>
    <div id="column-1">
      <div id="quote-container">
        <q id="quote"></q>
      </div>
      <button id="ask" class="cta" onclick="askHarvey()">
        <span>Ask Harvey</span>
        <svg viewBox="0 0 13 10" height="10px" width="15px">
          <path d="M1,5 L11,5"></path>
          <polyline points="8 1 12 5 8 9"></polyline>
        </svg>
      </button>
    </div>
    <img id="specter-1" src="media/specter.jpg" alt="Harvey Specter">
  </div>
  <script src="quote.js"></script>
</body>
</html>
